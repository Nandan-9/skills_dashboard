server {
    listen 80;
    server_name _;

    client_max_body_size 25m;

    location /static/ {
        alias /app/staticfiles/;
    }

    # Only Django admin and its static assets are proxied directly.
    # The app's own /api/* is served by the Next.js frontend, which calls
    # Django internally over the docker network (DJANGO_API_BASE_URL) -
    # it must not be intercepted here.
    location /admin/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://frontend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
